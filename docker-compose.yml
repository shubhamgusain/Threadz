version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: threadz-postgres
    environment:
      POSTGRES_DB: threadz
      POSTGRES_USER: threadz_user
      POSTGRES_PASSWORD: threadz_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - threadz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threadz_user -d threadz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: threadz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - threadz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./Threadz-V1/backend
      dockerfile: Dockerfile
    container_name: threadz-backend
    environment:
      - DATABASE_URL=postgresql://threadz_user:threadz_password@postgres:5432/threadz
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./Threadz-V1/backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - threadz-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./Threadz-V1/backend
      dockerfile: Dockerfile
    container_name: threadz-celery-worker
    command: celery -A app.queue worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://threadz_user:threadz_password@postgres:5432/threadz
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    volumes:
      - ./Threadz-V1/backend:/app
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - threadz-network
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./Threadz-V1/backend
      dockerfile: Dockerfile
    container_name: threadz-celery-beat
    command: celery -A app.queue beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://threadz_user:threadz_password@postgres:5432/threadz
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    volumes:
      - ./Threadz-V1/backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - threadz-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./Threadz-V1/frontend
      dockerfile: Dockerfile
    container_name: threadz-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./Threadz-V1/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - threadz-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: threadz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - threadz-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  threadz-network:
    driver: bridge
